name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin   # Eclipse Temurin — same JDK used in the Dockerfile
          cache: maven            # Caches ~/.m2/repository keyed on pom.xml hash

      - name: Run tests
        run: mvn verify -P coverage -B   # verify runs through the full lifecycle so JaCoCo's
                                         # report goal (bound to verify phase) actually executes

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/jacoco.xml

      - name: SonarCloud scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar -B 
        -Dsonar.projectKey=sanikasurose_throttle \
        -Dsonar.organization=sanikasurose \
        -Dsonar.host.url=https://sonarcloud.io \

      - name: Build jar
        run: mvn package -DskipTests -B   # Tests already ran above; skip to avoid running twice

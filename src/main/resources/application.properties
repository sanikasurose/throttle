spring.application.name=throttle

# Server
server.port=8080

# Redis — defaults for local development; overridden by environment variables in Docker
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Actuator — expose only health endpoint
management.endpoints.web.exposure.include=health

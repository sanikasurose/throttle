services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    # Persist data across container restarts; remove this volume if you want
    # a clean Redis on every `docker compose up`.
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  throttle:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Overrides the localhost defaults in application.properties so the app
      # resolves Redis by Docker's internal service name instead of 127.0.0.1.
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      redis:
        # Wait until Redis passes its health check before starting the app,
        # not just until the container is running.
        condition: service_healthy

volumes:
  redis-data:
